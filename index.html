<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Quiz</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --card:#111827;
      --cardHover:#172033;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --border:rgba(148,163,184,.18);
      --shadow:0 18px 45px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(34,197,94,.13), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .container{
      max-width:1280px;
      margin:0 auto;
      padding:28px 18px 30px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(56,189,248,.14), rgba(34,197,94,.08));
      border:1px solid var(--border);
      border-radius:22px;
      padding:24px 26px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .hero h1{
      margin:0;
      font-size:clamp(30px, 4vw, 48px);
      line-height:1.05;
      letter-spacing:-.03em;
    }

    .section-title{
      margin:0 0 14px;
      font-size:22px;
      letter-spacing:-.02em;
      color:var(--text);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:16px;
      margin-bottom:24px;
    }

    .card{
      background:rgba(17,24,39,.94);
      border:1px solid var(--border);
      border-radius:20px;
      padding:18px;
      box-shadow:var(--shadow);
      min-height:132px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:rgba(56,189,248,.42);
      background:var(--cardHover);
    }

    .card h2{
      margin:0 0 10px;
      font-size:20px;
      line-height:1.2;
    }

    .links{
      display:flex;
      gap:10px;
      flex-wrap:nowrap;
      margin-top:6px;
    }

    a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:15px;
      padding:12px 14px;
      border-radius:12px;
      background:linear-gradient(135deg, var(--accent), #2563eb);
      box-shadow:0 10px 22px rgba(37,99,235,.24);
      transition:transform .18s ease, opacity .18s ease;
      white-space:nowrap;
    }

    a.btn.secondary{
      background:linear-gradient(135deg, var(--accent2), #0f766e);
      box-shadow:0 10px 22px rgba(34,197,94,.16);
    }

    a.btn:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    @media (max-width: 1100px){
      .grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
    }

    @media (max-width: 700px){
      .grid{grid-template-columns:1fr}
      .hero{padding:20px}
      .card{min-height:auto}
      a.btn{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Finance Quiz</h1>
    </section>

    <h2 class="section-title">Class Quizzes</h2>
    <div class="grid">
      <div class="card">
        <div>
          <h2>Quiz Class 1</h2>
        </div>
        <div class="links">
          <a class="btn" href="fin_quiz1.html">Open Quiz</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Quiz Class 2</h2>
        </div>
        <div class="links">
          <a class="btn" href="fin_quiz2.html">Open Quiz</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Quiz Class 3</h2>
        </div>
        <div class="links">
          <a class="btn secondary" href="fin_quiz3.html">Open Quiz</a>
        </div>
      </div>
    </div>

    <h2 class="section-title">Misc</h2>
    <div class="grid">
      <div class="card">
        <div>
          <h2>Income Statement</h2>
        </div>
        <div class="links">
          <a class="btn" href="IncStatement.html">Open Quiz</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Balance Sheet</h2>
        </div>
        <div class="links">
          <a class="btn" href="BalanceSheet.html">Open Quiz</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Financial KPI Metrics</h2>
        </div>
        <div class="links">
          <a class="btn secondary" href="Fin_KPI_Metrics.html">Open Quiz</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Metrics Quiz</h2>
        </div>
        <div class="links">
          <a class="btn" href="Project_Metrics.html">Open Quiz</a>
        </div>
      </div>
    </div>

    <div class="footer">Finance Quiz Library</div>
  </div>
</body>
</html>
