let userAnswers = new Array(questions.length).fill(null);
let correctCount = 0;
let wrongCount = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  let currentSection = '';
  questions.forEach((q, i) => {
    if (q.section !== currentSection) {
      currentSection = q.section;
      const st = document.createElement('div');
      st.className = 'section-title';
      st.textContent = currentSection;
      container.appendChild(st);
    }
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;
    let optionsHtml = '';
    q.options.forEach((opt, j) => {
      optionsHtml += `<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}" onchange="handleAnswer(${i}, ${j})"> ${opt}</label>`;
    });
    card.innerHTML = `
      <div class="q-number">Question ${i+1} of ${questions.length} &bull; ${q.section}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${i}">${optionsHtml}</div>
      <div class="feedback" id="fb-${i}" style="display:none"></div>
    `;
    container.appendChild(card);
  });
}

function handleAnswer(qIdx, selectedIdx) {
  const q = questions[qIdx];
  const wasAnswered = userAnswers[qIdx] !== null;
  const wasCorrect = wasAnswered && userAnswers[qIdx] === q.answer;
  userAnswers[qIdx] = selectedIdx;
  const isCorrect = selectedIdx === q.answer;
  if (!wasAnswered) {
    if (isCorrect) correctCount++;
    else wrongCount++;
  } else {
    if (wasCorrect && !isCorrect) { correctCount--; wrongCount++; }
    else if (!wasCorrect && isCorrect) { wrongCount--; correctCount++; }
  }
  const opts = document.getElementById('opts-' + qIdx);
  const labels = opts.querySelectorAll('label');
  labels.forEach((lbl, j) => {
    lbl.classList.remove('correct', 'wrong', 'show-correct');
    if (j === q.answer) lbl.classList.add('show-correct');
    if (j === selectedIdx && !isCorrect) lbl.classList.add('wrong');
    if (j === selectedIdx && isCorrect) lbl.classList.add('correct');
  });
  const fb = document.getElementById('fb-' + qIdx);
  fb.style.display = 'block';
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '<b>&#9989; Correct!</b> ' : '<b>&#10060; Incorrect.</b> ') + q.explanation;
  const card = document.getElementById('card-' + qIdx);
  card.classList.remove('answered-correct', 'answered-wrong');
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  updateStats();
}

function updateStats() {
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('sc-correct').textContent = correctCount;
  document.getElementById('sc-wrong').textContent = wrongCount;
  document.getElementById('sc-answered').textContent = answered;
  document.getElementById('progress-bar').style.width = (answered / questions.length * 100) + '%';
}

function submitQuiz() {
  const answered = userAnswers.filter(a => a !== null).length;
  const skipped = questions.length - answered;
  const pct = Math.round(correctCount / questions.length * 100);
  let gradeClass, gradeMsg;
  if (pct >= 85) { gradeClass = 'excellent'; gradeMsg = '&#127942; Excellent! Outstanding performance!'; }
  else if (pct >= 70) { gradeClass = 'good'; gradeMsg = '&#128077; Good job! Keep it up!'; }
  else if (pct >= 50) { gradeClass = 'average'; gradeMsg = '&#128218; Average. Review the topics below.'; }
  else { gradeClass = 'poor'; gradeMsg = '&#128165; Needs improvement. Study the material carefully.'; }

  const sectionStats = {};
  questions.forEach((q, i) => {
    if (!sectionStats[q.section]) sectionStats[q.section] = {total:0, correct:0};
    sectionStats[q.section].total++;
    if (userAnswers[i] === q.answer) sectionStats[q.section].correct++;
  });

  let sectionHtml = '<div class="section-recap"><h3>&#128202; Performance by Section</h3>';
  Object.entries(sectionStats).forEach(([sec, stat]) => {
    const sp = Math.round(stat.correct/stat.total*100);
    const color = sp >= 70 ? '#4caf50' : sp >= 50 ? '#ff9800' : '#e53935';
    sectionHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0;">
      <span style="font-size:0.9rem">${sec}</span>
      <span style="font-weight:bold;color:${color}">${stat.correct}/${stat.total} (${sp}%)</span>
    </div>`;
  });
  sectionHtml += '</div>';

  let reviewHtml = '';
  const wrongOrSkipped = questions.filter((q, i) => userAnswers[i] !== q.answer);
  if (wrongOrSkipped.length > 0) {
    reviewHtml = '<div class="section-recap" style="margin-top:20px"><h3>&#128270; Questions to Review</h3>';
    wrongOrSkipped.forEach((q, _) => {
      const i = questions.indexOf(q);
      const isSkipped = userAnswers[i] === null;
      const cls = isSkipped ? 'skipped-item' : 'wrong-item';
      const tag = isSkipped ? '&#9940; Skipped' : '&#10060; Wrong';
      reviewHtml += `<div class="review-item ${cls}">
        <div class="ri-q">${tag} &mdash; Q${i+1}: ${q.q}</div>
        <div class="ri-ans">&#9989; Correct answer: <b>${q.options[q.answer]}</b></div>
        <div class="ri-ans" style="margin-top:4px;font-size:0.85rem;color:#666">${q.explanation}</div>
      </div>`;
    });
    reviewHtml += '</div>';
  }

  const recap = document.getElementById('recap');
  recap.style.display = 'block';
  recap.innerHTML = `
    <h2>&#127919; Quiz Results</h2>
    <div class="grade-msg ${gradeClass}">${gradeMsg}</div>
    <div class="score-circle">
      <div class="big">${pct}%</div>
      <div class="sub">${correctCount} correct out of ${questions.length} questions</div>
    </div>
    <div class="recap-stats">
      <div class="stat-box green"><div class="num">${correctCount}</div><div class="lbl">&#9989; Correct</div></div>
      <div class="stat-box red"><div class="num">${wrongCount}</div><div class="lbl">&#10060; Wrong</div></div>
      <div class="stat-box orange"><div class="num">${skipped}</div><div class="lbl">&#9940; Skipped</div></div>
      <div class="stat-box blue"><div class="num">${answered}</div><div class="lbl">&#128203; Answered</div></div>
    </div>
    ${sectionHtml}
    ${reviewHtml}
    <div style="text-align:center;margin-top:24px">
      <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:#1a3c6e;color:white;border:none;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:bold">&#8679; Back to Top</button>
    </div>
  `;
  recap.scrollIntoView({behavior: 'smooth'});
}

buildQuiz();
</script>
