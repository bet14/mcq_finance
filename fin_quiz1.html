const userAnswers = new Array(questions.length).fill(-1);

function buildQuiz() {
  const area = document.getElementById('quizArea');
  let html = '';
  questions.forEach(function(q, i) {
    html += '<div class="question-card" id="card-' + i + '">';
    html += '<div class="q-header">';
    html += '<span class="q-number">Q' + (i+1) + ' / ' + questions.length + ' &bull; ' + q.topic + '</span>';
    html += '<span class="q-status" id="status-' + i + '" style="display:none"></span>';
    html += '</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    html += '<div class="options" id="opts-' + i + '">';
    q.options.forEach(function(opt, j) {
      const letter = String.fromCharCode(65 + j);
      html += '<button class="option-btn" id="opt-' + i + '-' + j + '" onclick="selectAnswer(' + i + ',' + j + ')">';
      html += '<span class="option-letter">' + letter + ')</span><span>' + opt + '</span>';
      html += '</button>';
    });
    html += '</div>';
    html += '<div class="feedback" id="feedback-' + i + '"></div>';
    html += '</div>';
  });
  area.innerHTML = html;
  updateProgress();
}

function selectAnswer(qi, oi) {
  if (userAnswers[qi] !== -1) return;
  userAnswers[qi] = oi;
  const q = questions[qi];
  const isCorrect = (oi === q.answer);
  const card = document.getElementById('card-' + qi);
  const fb = document.getElementById('feedback-' + qi);
  const st = document.getElementById('status-' + qi);
  q.options.forEach(function(_, j) {
    const btn = document.getElementById('opt-' + qi + '-' + j);
    btn.disabled = true;
    if (j === q.answer) btn.classList.add('correct-ans');
    if (j === oi && !isCorrect) btn.classList.add('wrong-ans');
  });
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  st.textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
  st.className = 'q-status ' + (isCorrect ? 'correct' : 'incorrect');
  st.style.display = 'inline-block';
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
  fb.innerHTML = (isCorrect ? '<strong>&#10003; Correct!</strong> ' : '<strong>&#10007; Incorrect.</strong> ') + q.explanation;
  updateProgress();
}

function updateProgress() {
  const answered = userAnswers.filter(function(a) { return a !== -1; }).length;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = answered + ' / ' + questions.length + ' answered';
}

function submitQuiz() {
  let correct = 0, incorrect = 0, skipped = 0;
  const topicStats = {};
  questions.forEach(function(q, i) {
    if (!topicStats[q.topic]) topicStats[q.topic] = {correct: 0, total: 0};
    topicStats[q.topic].total++;
    if (userAnswers[i] === -1) {
      skipped++;
    } else if (userAnswers[i] === q.answer) {
      correct++;
      topicStats[q.topic].correct++;
    } else {
      incorrect++;
    }
  });
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  let gradeClass, gradeMsg;
  if (pct >= 85) { gradeClass = 'excellent'; gradeMsg = '&#127881; Excellent! Outstanding performance!'; }
  else if (pct >= 70) { gradeClass = 'good'; gradeMsg = '&#128077; Good job! Solid understanding of Finance concepts.'; }
  else if (pct >= 50) { gradeClass = 'average'; gradeMsg = '&#128161; Keep going! Review the topics you missed.'; }
  else { gradeClass = 'poor'; gradeMsg = '&#128218; More study needed. Focus on the weak areas below.'; }
  let barColor = pct >= 85 ? '#38a169' : pct >= 70 ? '#4299e1' : pct >= 50 ? '#d69e2e' : '#e53e3e';
  let recapHTML = '<h2>&#128203; Quiz Results</h2>';
  recapHTML += '<div class="grade-msg ' + gradeClass + '">' + gradeMsg + '</div>';
  recapHTML += '<div class="score-grid">';
  recapHTML += '<div class="score-card s-total"><div class="num">' + total + '</div><div class="lbl">Total Questions</div></div>';
  recapHTML += '<div class="score-card s-correct"><div class="num">' + correct + '</div><div class="lbl">Correct</div></div>';
  recapHTML += '<div class="score-card s-incorrect"><div class="num">' + incorrect + '</div><div class="lbl">Incorrect</div></div>';
  recapHTML += '<div class="score-card s-skipped"><div class="num">' + skipped + '</div><div class="lbl">Skipped</div></div>';
  recapHTML += '</div>';
  recapHTML += '<div class="grade-bar-wrap"><label>Score: ' + pct + '%</label>';
  recapHTML += '<div class="grade-bar-bg"><div class="grade-bar-fill" style="width:' + pct + '%;background:' + barColor + '">' + pct + '%</div></div></div>';
  recapHTML += '<div class="topic-breakdown"><h3>&#128200; Performance by Topic</h3>';
  Object.keys(topicStats).forEach(function(topic) {
    const s = topicStats[topic];
    const tp = Math.round((s.correct / s.total) * 100);
    const tcolor = tp >= 80 ? '#38a169' : tp >= 60 ? '#d69e2e' : '#e53e3e';
    recapHTML += '<div class="topic-row">';
    recapHTML += '<span class="topic-name">' + topic + '</span>';
    recapHTML += '<div class="topic-bar-bg"><div class="topic-bar-fill" style="width:' + tp + '%;background:' + tcolor + '"></div></div>';
    recapHTML += '<span class="topic-pct" style="color:' + tcolor + '">' + tp + '%</span>';
    recapHTML += '</div>';
  });
  recapHTML += '</div>';
  const weakTopics = Object.keys(topicStats).filter(function(t) { return (topicStats[t].correct / topicStats[t].total) < 0.6; });
  const strongTopics = Object.keys(topicStats).filter(function(t) { return (topicStats[t].correct / topicStats[t].total) >= 0.8; });
  if (weakTopics.length > 0) {
    recapHTML += '<div class="improve-section"><h3>&#9888; Topics to Improve</h3>';
    weakTopics.forEach(function(t) {
      const s = topicStats[t];
      recapHTML += '<div class="improve-item"><strong>' + t + '</strong>: ' + s.correct + '/' + s.total + ' correct — Review this topic carefully.</div>';
    });
    recapHTML += '</div>';
  }
  if (strongTopics.length > 0) {
    recapHTML += '<div class="well-done-section"><h3>&#10003; Strong Areas</h3>';
    strongTopics.forEach(function(t) {
      const s = topicStats[t];
      recapHTML += '<div class="well-done-item"><strong>' + t + '</strong>: ' + s.correct + '/' + s.total + ' correct &#127881;</div>';
    });
    recapHTML += '</div>';
  }
  const missedQs = questions.filter(function(q, i) { return userAnswers[i] !== -1 && userAnswers[i] !== q.answer; });
  if (missedQs.length > 0) {
    recapHTML += '<div class="improve-section"><h3>&#128270; Questions to Review (' + missedQs.length + ' missed)</h3>';
    questions.forEach(function(q, i) {
      if (userAnswers[i] !== -1 && userAnswers[i] !== q.answer) {
        recapHTML += '<div class="improve-item"><strong>Q' + (i+1) + ':</strong> ' + q.q + '<br>';
        recapHTML += '<span style="color:#9b2c2c">Your answer: ' + q.options[userAnswers[i]] + '</span><br>';
        recapHTML += '<span style="color:#276749">Correct answer: ' + q.options[q.answer] + '</span></div>';
      }
    });
    recapHTML += '</div>';
  }
  const recap = document.getElementById('recap');
  recap.innerHTML = recapHTML;
  recap.className = 'recap show';
  recap.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function resetQuiz() {
  userAnswers.fill(-1);
  buildQuiz();
  document.getElementById('recap').className = 'recap';
  document.getElementById('recap').innerHTML = '';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildQuiz();
</script>
